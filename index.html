<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCF Daily Picker</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <img src="stackit-logo.svg" alt="STACKIT Logo" class="stackit-logo">
        </div>
        <div class="title-container">
            <h1>Daily Presenter</h1>
        </div>
        <div class="wheel-container">
            <canvas id="wheel"></canvas>
            <div class="arrow"></div>
        </div>
        <div id="result" class="result"></div>
    </div>

    <!-- Stats panel -->
    <button id="stats-toggle" class="stats-toggle" title="Pity stats">&#x2696;</button>
    <div id="stats-panel" class="stats-panel">
        <h3>Pick Statistics</h3>
        <table class="stats-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Picks</th>
                    <th>Chance</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
